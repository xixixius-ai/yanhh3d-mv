# 📁 Lưu tại: .github/workflows/scraper.yml
name: 🎬 YanHH3D Auto Scraper

on:
  schedule:
    - cron: '0 3 * * *'        # Chạy tự động 10:00 AM giờ VN hàng ngày
  workflow_dispatch:           # Cho phép nhấn nút chạy thủ công
  push:
    paths:
      - 'scraper.py'
      - '.github/workflows/scraper.yml'

# ⚠️ Quyền ghi file để workflow tự push kết quả về repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        # ✅ Cài trực tiếp, không cần file requirements.txt
        run: pip install requests beautifulsoup4 lxml

      - name: 🕷️ Run Scraper
        env:
          YANH_BASE_URL: https://yanhh3d.bz
          OUTPUT_PATH: yanhh3d.json
          MAX_PAGES: "5"
          ITEMS_PER_PAGE: "60"
        run: python scraper.py

      - name: ✅ Validate JSON
