name: YanHH3D Scraper → MonPlayer JSON

on:
  # Chạy tự động mỗi 6 tiếng
  schedule:
    - cron: "0 */6 * * *"

  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Số trang tối đa cần crawl"
        required: false
        default: "10"

  # Chạy khi push code mới vào main
  push:
    branches: [main]
    paths:
      - "scraper.py"

jobs:
  scrape:
    name: Crawl & Build JSON
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # cần để commit file JSON trở lại repo

    steps:
      # ── 1. Checkout repo ──────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Python ───────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Cài dependencies ───────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # ── 4. Chạy scraper ───────────────────────────────
      - name: Run scraper
        env:
          MAX_PAGES: ${{ github.event.inputs.max_pages || '10' }}
        run: |
          python -c "
          import os, importlib.util
          spec = importlib.util.spec_from_file_location('scraper', 'scraper.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          mod.MAX_PAGES = int(os.getenv('MAX_PAGES', '10'))
          mod.main()
          "

      # ── 5. Kiểm tra output ────────────────────────────
      - name: Validate output JSON
        run: |
          python -c "
          import json, sys
          try:
              data = json.load(open('monplayer.json', encoding='utf-8'))
              count = len(data.get('items', []))
              print(f'OK: {count} phim')
              sys.exit(0 if count > 0 else 1)
          except Exception as e:
              print(f'FAIL: {e}')
              sys.exit(1)
          "

      # ── 6. Upload artifact ────────────────────────────
      - name: Upload monplayer.json
        uses: actions/upload-artifact@v4
        with:
          name: monplayer-json
          path: monplayer.json
          retention-days: 7

      # ── 7. Commit & push JSON về repo ─────────────────
      - name: Commit updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monplayer.json
          if git diff --cached --quiet; then
            echo "Không có thay đổi, bỏ qua commit."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update monplayer.json [${TIMESTAMP}]"
            git push
          fi
