# 📁 Lưu tại: .github/workflows/scraper.yml
name: 🎬 YanHH3D Auto Scraper

on:
  schedule:
    - cron: '0 3 * * *'        # 10:00 AM giờ VN hàng ngày
  workflow_dispatch:           # Chạy thủ công từ tab Actions
  push:
    paths:
      - 'scraper.py'
      - '.github/workflows/scraper.yml'

permissions:
  contents: write              # Cấp quyền push kết quả về repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🕷️ Run Scraper
        env:
          YANH_BASE_URL: https://yanhh3d.bz
          OUTPUT_PATH: yanhh3d.json
          MAX_PAGES: "5"
          ITEMS_PER_PAGE: "60"
        run: python scraper.py

      - name: ✅ Validate JSON
        # ✅ Dùng run: | để YAML parse đúng multiline, tránh lỗi heredoc
        run: |
          python -c "
          import json
          with open('yanhh3d.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          count = len(data.get('channels', []))
          print(f'✅ JSON hợp lệ! Đã export {count} phim.')
          "

      - name: 📤 Commit & Push Result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add yanhh3d.json
          git commit -m "🤖 Auto-update: yanhh3d.json $(date +'%Y-%m-%d %H:%M')" || echo "⏭️ Không có thay đổi mới"
          git push
