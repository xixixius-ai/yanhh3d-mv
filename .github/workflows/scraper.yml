name: 🎬 YanHH3D Auto Scraper

on:
  schedule:
    - cron: '0 3 * * *'        # 10:00 AM giờ VN hàng ngày
  workflow_dispatch:           # Chạy thủ công
  push:
    paths:
      - 'scraper.py'

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Cấp quyền ghi trực tiếp trong code
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🕷️ Run Scraper
        env:
          YANH_BASE_URL: https://yanhh3d.bz
          OUTPUT_PATH: yanhh3d.json
        run: python scraper.py

      - name: 📤 Force Push Result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Force add file JSON
          git add -f yanhh3d.json
          
          # Commit bất chấp có thay đổi hay không (dùng --allow-empty nếu cần)
          # Ở đây ta dùng || true để tránh dừng workflow nếu không có gì mới
          git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # Pull bản mới nhất về, ưu tiên bản của Action (strategy-option=theirs)
          git pull origin main --rebase -X theirs
          
          # Push cưỡng ép lên nhánh chính
          git push origin main --force
