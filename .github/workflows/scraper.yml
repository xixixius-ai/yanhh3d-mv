name: 🎬 YanHH3D Auto Scraper

on:
  schedule:
    - cron: '0 3 * * *'        # 10:00 AM giờ VN hàng ngày
  workflow_dispatch:           # Chạy thủ công để kiểm tra ngay
  push:
    paths:
      - 'scraper.py'

permissions:
  contents: write              # Bắt buộc phải có để push file

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Lấy toàn bộ lịch sử để pull/rebase không lỗi

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: 🕷️ Run Scraper
        env:
          YANH_BASE_URL: https://yanhh3d.bz
          OUTPUT_PATH: yanhh3d.json
        run: python scraper.py

      - name: 📤 Commit & Push Result
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Cập nhật thay đổi từ Remote trước để tránh lỗi rejected
          git pull origin main --rebase

          # Kiểm tra nếu file JSON có thay đổi
          git add yanhh3d.json
          
          if git diff --staged --quiet; then
            echo "⏭️ Không có dữ liệu mới để cập nhật."
          else
            git commit -m "🤖 Auto-update: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
            echo "✅ Đã cập nhật file JSON thành công lên Repository."
          fi
