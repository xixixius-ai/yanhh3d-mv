name: Scrape YanHH3D to MonPlayer

on:
  schedule:
    # ✅ Chạy 1 lần/ngày lúc 3:00 AM UTC (10 AM VN) - giờ server rảnh
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_movies:
        description: 'Max movies to scrape (default: 50)'
        required: false
        default: '50'
        type: string
      max_episodes:
        description: 'Max episodes per movie (empty = all)'
        required: false
        default: ''
        type: string
      full_scan:
        description: 'Full scan all episodes (ignore max_episodes)'
        required: false
        default: 'false'
        type: boolean
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    # ✅ Tăng timeout cho full scan (50 movies × ~30 eps × delay)
    timeout-minutes: 90
    concurrency:
      group: scrape-main
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # ✅ Cache pip dependencies

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # ✅ Cache Playwright browser để không download mỗi lần chạy
          if [ ! -d ~/.cache/ms-playwright ]; then
            playwright install chromium
            playwright install-deps chromium
          fi
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

      - name: Determine scrape scope
        id: scope
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual dispatch: dùng params từ input
            echo "max_movies=${{ inputs.max_movies || 50 }}" >> $GITHUB_OUTPUT
            echo "max_episodes=${{ inputs.max_episodes }}" >> $GITHUB_OUTPUT
            echo "full_scan=${{ inputs.full_scan }}" >> $GITHUB_OUTPUT
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            # Scheduled: chạy nhẹ, chỉ 30 movies, 20 eps/movie
            echo "max_movies=30" >> $GITHUB_OUTPUT
            echo "max_episodes=20" >> $GITHUB_OUTPUT
            echo "full_scan=false" >> $GITHUB_OUTPUT
            echo "mode=scheduled" >> $GITHUB_OUTPUT
          fi

      - name: Run scraper
        run: |
          CMD="python scraper.py"
          CMD="$CMD --max-movies ${{ steps.scope.outputs.max_movies }}"
          
          if [[ "${{ steps.scope.outputs.full_scan }}" != "true" && -n "${{ steps.scope.outputs.max_episodes }}" ]]; then
            CMD="$CMD --max-episodes ${{ steps.scope.outputs.max_episodes }}"
          fi
          
          echo "▶️ Running: $CMD"
          $CMD
        env:
          PYTHONUNBUFFERED: 1
          RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            *.log
            ophim.json
          retention-days: 7

      - name: Commit & push changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Auto update MonPlayer (Thuyết Minh)
            
            Mode: ${{ steps.scope.outputs.mode }}
            Movies: ${{ steps.scope.outputs.max_movies }}
            Episodes: ${{ steps.scope.outputs.max_episodes }}
            Run: ${{ github.run_id }}
          file_pattern: 'ophim.json ophim/detail/*.json'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          skip_fetch: true
