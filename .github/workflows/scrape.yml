name: 🎬 Scrape YanHH3D

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scraper.py"
      - "requirements.txt"
      - ".github/workflows/run.yml"

jobs:
  scrape:
    runs-on: ubuntu-22.04  # ✅ Fix: ubuntu-24.04 thiếu libasound2
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright & Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Validate JSON
        run: |
          python -c "import json; d=json.load(open('monplayer.json')); assert 'items' in d; print(f'OK: {len(d[\"items\"])} items')"

      - name: Commit result
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update: $(date '+%Y-%m-%d')"
          file_pattern: "monplayer.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
