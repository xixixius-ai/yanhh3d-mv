name: Scrape YanHH3D

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

env:
  BASE_URL: 'https://yanhh3d.bz'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}

      - name: Validate output
        run: |
          test -f monplayer.json || { echo "No output"; exit 1; }
          python -m json.tool monplayer.json > /dev/null && echo "JSON valid"
          python -c "import json; d=json.load(open('monplayer.json')); print('Films:', len(d.get('items',[]))); print('Streams:', sum(len(i.get('streams',[])) for i in d.get('items',[])))"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monplayer-output
          path: monplayer.json
          retention-days: 7

      - name: Commit result
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monplayer.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update monplayer.json"
            git push origin HEAD:${{ github.ref_name }}
          fi
