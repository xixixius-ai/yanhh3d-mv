name: Scrape YanHH3D — Test Mode

on:
  workflow_dispatch:

env:
  BASE_URL: 'https://yanhh3d.bz'

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps + Playwright
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run scraper (test mode: 1 phim)
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}

      - name: Show output
        run: |
          echo "=== monplayer.json ==="
          cat monplayer.json
          echo ""
          echo "=== Stream URLs ==="
          python -c "import json; d=json.load(open('monplayer.json')); [print(s['url']) for i in d.get('items',[]) for s in i.get('streams',[])]"

      - name: Commit if has streams
        run: |
          HAS_STREAMS=$(python -c "import json; d=json.load(open('monplayer.json')); print('yes' if any(i.get('streams') for i in d.get('items',[])) else 'no')")
          if [ "$HAS_STREAMS" = "yes" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add monplayer.json
            git commit -m "test: aggressive stream capture — $(date -u +'%Y-%m-%d')"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Pushed with streams"
          else
            echo "⚠️ No streams found — check logs above"
          fi
