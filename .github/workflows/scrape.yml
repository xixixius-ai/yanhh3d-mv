name: Scrape YanHH3D to MonPlayer

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/run.yml'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Validate JSON
        run: |
          python -c "import json; data = json.load(open('ophim.json')); print('OK:', len(data['channels']), 'items')"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto update MonPlayer data'
          file_pattern: 'ophim.json'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
