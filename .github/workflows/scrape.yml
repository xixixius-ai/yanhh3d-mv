name: Scrape YanHH3D to MonPlayer

on:
  schedule:
    - cron: '0 */4 * * *'  # Chạy mỗi 4h/lần
  workflow_dispatch:
    inputs:
      max_movies:
        description: 'Max movies (default: 30)'
        required: false
        default: '30'
        type: string
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'
      - 'progress.json'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 180
    concurrency:
      group: scrape-main
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        run: |
          MAX_MOVIES="${{ inputs.max_movies || '30' }}"
          echo "▶️ Running: python scraper.py --max-movies $MAX_MOVIES"
          python scraper.py --max-movies $MAX_MOVIES
        env:
          PYTHONUNBUFFERED: 1
          RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main

      - name: Commit & push changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Auto update MonPlayer (v4.0 Stateful)
            
            Movies processed: ${{ inputs.max_movies || 30 }}
            Run: ${{ github.run_id }}
          file_pattern: 'ophim.json ophim/detail/*.json progress.json'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          skip_fetch: false
