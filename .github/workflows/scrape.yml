name: Scrape YanHH3D

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  BASE_URL: 'https://yanhh3d.bz'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps + Playwright
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}

      - name: Preview output
        run: |
          echo "=== First 30 lines ==="
          head -30 monplayer.json
          echo "=== Film count ==="
          python -c "import json; d=json.load(open('monplayer.json')); print(f'Films: {len(d.get(\"items\",[]))}')"

      - name: Commit & push (force with timestamp)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add monplayer.json
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-update: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin HEAD:${{ github.ref_name }} --verbose
            echo "✅ Pushed successfully"
          else
            echo "⚠️ No changes detected (shouldn't happen with timestamp)"
          fi

      - name: Upload debug files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-output
          path: |
            monplayer.json
            debug_dom.html
          retention-days: 5
