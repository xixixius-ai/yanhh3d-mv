name: Scrape YanHH3D to MonPlayer

on:
  schedule:
    - cron: '0 3 * * *'  # 1 lần/ngày lúc 3 AM UTC
  workflow_dispatch:
    inputs:
      max_movies:
        description: 'Max movies (default: 30)'
        required: false
        default: '30'
        type: string
      max_episodes:
        description: 'Max episodes/movie (empty = all)'
        required: false
        default: '20'
        type: string
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 90
    concurrency:
      group: scrape-main
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # ✅ QUAN TRỌNG: Cài Playwright browser + system deps
          playwright install --with-deps chromium

      - name: Run scraper
        run: |
          MAX_MOVIES="${{ inputs.max_movies || '30' }}"
          MAX_EPISODES="${{ inputs.max_episodes || '20' }}"
          CMD="python scraper.py --max-movies $MAX_MOVIES --max-episodes $MAX_EPISODES"
          echo "▶️ Running: $CMD"
          $CMD
        env:
          PYTHONUNBUFFERED: 1
          RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            *.log
            ophim.json
            ophim/detail/*.json
          retention-days: 7

      - name: Commit & push changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Auto update MonPlayer (Thuyết Minh)
            
            Movies: ${{ inputs.max_movies || 30 }}
            Episodes: ${{ inputs.max_episodes || 20 }}
            Run: ${{ github.run_id }}
          file_pattern: 'ophim.json ophim/detail/*.json'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          skip_fetch: false
