name: Scrape YanHH3D to MonPlayer

on:
  schedule:
    # ✅ Incremental mode: 1x/day, fast (~5-10 min)
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full
          - sequential
      max_movies:
        description: 'Max movies (default: 50)'
        required: false
        default: '50'
        type: string
      max_episodes:
        description: 'Max episodes/movie (empty = all)'
        required: false
        default: ''
        type: string
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'

jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 60
    concurrency:
      group: scrape-main
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ ! -d ~/.cache/ms-playwright ]; then
            playwright install chromium
            playwright install-deps chromium
          fi
        env:
          PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright

      - name: Determine flags
        id: flags
        run: |
          MODE="${{ inputs.mode || 'incremental' }}"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            MODE="incremental"
          fi
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "incremental=$([ "$MODE" = "incremental" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "sequential=$([ "$MODE" = "sequential" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT
          echo "full_scan=$([ "$MODE" = "full" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

      - name: Run scraper
        run: |
          CMD="python scraper.py"
          CMD="$CMD --max-movies ${{ inputs.max_movies || 50 }}"
          
          if [[ -n "${{ inputs.max_episodes }}" ]]; then
            CMD="$CMD --max-episodes ${{ inputs.max_episodes }}"
          fi
          
          if [[ "${{ steps.flags.outputs.incremental }}" == "true" ]]; then
            CMD="$CMD --incremental"
          fi
          if [[ "${{ steps.flags.outputs.full_scan }}" == "true" ]]; then
            CMD="$CMD --full-scan"
          fi
          if [[ "${{ steps.flags.outputs.sequential }}" == "true" ]]; then
            CMD="$CMD --sequential"
          fi
          
          echo "▶️ Running: $CMD"
          $CMD
        env:
          PYTHONUNBUFFERED: 1
          RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            *.log
            ophim.json
            ophim/.state.json
          retention-days: 7

      - name: Commit & push changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: |
            🤖 Auto update MonPlayer (Thuyết Minh)
            
            Mode: ${{ steps.flags.outputs.mode }}
            Parallel: ${{ steps.flags.outputs.sequential == 'false' }}
            Movies: ${{ inputs.max_movies || 50 }}
            Run: ${{ github.run_id }}
          file_pattern: 'ophim.json ophim/detail/*.json ophim/.state.json'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          push_options: '--force-with-lease'
          skip_fetch: true
