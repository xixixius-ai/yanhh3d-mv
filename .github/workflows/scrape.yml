name: Scrape YanHH3D

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "So trang listing (1-10)"
        required: false
        default: "5"
      debug:
        description: "Bat debug mode"
        required: false
        default: "false"
  push:
    paths:
      - "scraper.py"
      - ".github/workflows/scrape.yml"

env:
  BASE_URL: "https://yanhh3d.bz"
  MAX_PAGES: "5"
  DEBUG_SCRAPER: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # cache: "pip"  ← Đã bỏ để tránh lỗi thiếu requirements.txt

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Set env from inputs
        run: |
          echo "MAX_PAGES=${{ github.event.inputs.pages || '5' }}" >> $GITHUB_ENV
          echo "DEBUG_SCRAPER=${{ github.event.inputs.debug || 'false' }}" >> $GITHUB_ENV

      - name: Test connection
        run: |
          echo "Testing ${{ env.BASE_URL }}"
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            -H "User-Agent: Mozilla/5.0" \
            -L "${{ env.BASE_URL }}/moi-cap-nhat"

      - name: Run scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}
          CF_CLEARANCE: ${{ secrets.CF_CLEARANCE }}

      - name: Validate output
        run: |
          test -f monplayer.json || { echo "No output"; exit 1; }
          python -m json.tool monplayer.json > /dev/null && echo "JSON OK"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-output
          path: monplayer.json
          retention-days: 7

      - name: Commit result
        if: success()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add monplayer.json
          git diff --cached --quiet && echo "No changes" || \
            (git commit -m "Auto update monplayer.json" && git push)
