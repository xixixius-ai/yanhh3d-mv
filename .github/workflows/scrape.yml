name: Scrape YanHH3D

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      pages:
        description: "So trang listing (1-10)"
        required: false
        default: "5"
      debug:
        description: "Bat debug mode"
        required: false
        default: "false"
  push:
    paths:
      - "scraper.py"
      - ".github/workflows/scrape.yml"

env:
  BASE_URL: "https://yanhh3d.bz"
  MAX_PAGES: "5"
  DEBUG_SCRAPER: "false"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: Set env from inputs
        run: |
          echo "MAX_PAGES=${{ github.event.inputs.pages || '5' }}" >> $GITHUB_ENV
          echo "DEBUG_SCRAPER=${{ github.event.inputs.debug || 'false' }}" >> $GITHUB_ENV

      - name: Test connection
        run: |
          echo "Testing ${{ env.BASE_URL }}"
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
            -H "User-Agent: Mozilla/5.0" \
            -L "${{ env.BASE_URL }}/moi-cap-nhat"

      - name:
