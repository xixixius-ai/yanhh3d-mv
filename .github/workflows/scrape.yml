name: Scrape YanHH3D to MonPlayer
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scraper.py'
      - 'requirements.txt'
      - '.github/workflows/scrape.yml'  # ⚠️ Đảm bảo tên file khớp với tên file workflow
jobs:
  scrape:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 45
    concurrency:
      group: scrape-main
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - run: python [scraper.py](http://scraper.py)
        env:
          PYTHONUNBUFFERED: 1
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🤖 Auto update MonPlayer (Thuyết Minh)'
          file_pattern: 'ophim.json ophim/detail/*.json'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@[users.noreply.github.com](http://users.noreply.github.com)
          push_options: '--force-with-lease'
