name: Scrape YanHH3D

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Bat debug mode (xem HTML thuc te)"
        required: false
        default: "true"
        type: boolean

env:
  BASE_URL: "https://yanhh3d.bz"

jobs:
  debug-and-scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests beautifulsoup4 lxml

      - name: 🔍 Debug HTML Structure
        if: github.event.inputs.debug == 'true'
        run: |
          echo "=== 1. Listing page ==="
          curl -s -H "User-Agent: Mozilla/5.0" "$BASE_URL/moi-cap-nhat" > listing.html
          echo "Sample movie slugs:"
          grep -oE 'href="/[^"]*"' listing.html | grep -v -E "(tap-|sever|login|register|\?|#)" | head -10
          
          echo ""
          echo "=== 2. Episode page (kiem-lai-phan-2/tap-1) ==="
          curl -s -H "User-Agent: Mozilla/5.0" "$BASE_URL/kiem-lai-phan-2/tap-1" > episode.html || echo "Page not found"
          if [ -f episode.html ]; then
            echo "Direct .m3u8/.mp4 found:"
            grep -oE 'https?://[^"'\''[:space:]]*\.(m3u8|mp4)[^"'\''[:space:]]*' episode.html | head -5 || echo "(none)"
            echo ""
            echo "JS file/src patterns:"
            grep -oE '(file|src|source|url)\s*[:=]\s*"[^"]*\.(m3u8|mp4)[^"]*"' episode.html | head -3 || echo "(none)"
          fi

      - name: Upload debug files
        if: github.event.inputs.debug == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-output
          path: |
            listing.html
            episode.html
          retention-days: 3

      - name: Run scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}
