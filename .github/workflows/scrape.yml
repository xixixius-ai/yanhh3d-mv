name: Scrape YanHH3D

on:
  workflow_dispatch:
    inputs:
      pages:
        description: "So trang listing (1-5)"
        required: false
        default: "2"
      max_episodes:
        description: "So tap toi da / phim"
        required: false
        default: "50"
  schedule:
    - cron: '0 */6 * * *'
  push:
    paths:
      - 'scraper.py'
      - '.github/workflows/scrape.yml'

env:
  BASE_URL: 'https://yanhh3d.bz'
  MAX_PAGES: ${{ github.event.inputs.pages || '2' }}
  MAX_EP_PER_FILM: ${{ github.event.inputs.max_episodes || '50' }}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      # Bước 1: Lấy code từ repo
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Bước 2: Cài Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Bước 3: Cài thư viện
      - name: 📥 Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright beautifulsoup4 lxml
          playwright install chromium
          playwright install-deps chromium

      # Bước 4: Backup file cũ
      - name: 🧪 Backup existing output
        run: |
          if [ -f monplayer.json ]; then
            cp monplayer.json monplayer.old.json
            OLD_COUNT=$(python -c "import json; print(len(json.load(open('monplayer.old.json')).get('items',[])))")
            echo "OLD_ITEMS=$OLD_COUNT" >> $GITHUB_ENV
            echo "📊 Existing: $OLD_COUNT movies"
          else
            echo "OLD_ITEMS=0" >> $GITHUB_ENV
            touch monplayer.old.json
            echo "📊 No existing output"
          fi

      # Bước 5: Chạy scraper chính
      - name: 🕷️ Run scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}
          MAX_PAGES: ${{ env.MAX_PAGES }}
          MAX_EP_PER_FILM: ${{ env.MAX_EP_PER_FILM }}

      # Bước 6: Tạo script kiểm tra (cách này tránh lỗi YAML syntax)
      - name: 📝 Create validation script
        run: |
          cat > check_output.py << 'EOF'
          import json
          import sys

          # Đọc file mới
          with open('monplayer.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          items = data.get('items', [])
          new_count = len(items)
          
          # Đọc số cũ từ env (nếu có)
          old_count = int('${{ env.OLD_ITEMS }}') if '${{ env.OLD_ITEMS }}' else 0

          print(f"\n{'='*50}")
          print(f"  📈 RESULTS: {old_count} → {new_count} movies")
          print(f"{'='*50}\n")

          if new_count == 0:
              print("⚠️ WARNING: No movies found in new output!")
              sys.exit(0) # Không fail, chỉ cảnh báo

          # In 3 phim đầu
          print("🎬 First 3 movies:")
          for i, item in enumerate(items[:3], 1):
              title = item.get('title', 'N/A')
              streams = item.get('streams', [])
              print(f"  {i}. {title}")
              print(f"     → {len(streams)} streams")
              if streams:
                  url = streams[0].get('url', 'N/A')
                  print(f"     → Link: {url[:80]}...")

          # Kiểm tra link hợp lệ
          valid = sum(1 for it in items for s in it.get('streams', []) if '.m3u8' in s.get('url', '') or '.mp4' in s.get('url', ''))
          total = sum(len(it.get('streams', [])) for it in items)
          print(f"\n✅ Valid Streams: {valid}/{total}")
          
          # Ghi kết quả ra env để bước sau dùng
          with open(os.environ['GITHUB_ENV'], 'a') as env_file:
              env_file.write(f"NEW_ITEMS={new_count}\n")
          EOF

      # Bước 7: Chạy script kiểm tra
      - name: 🔍 Validate Output
        run: python check_output.py

      # Bước 8: Commit nếu có thay đổi
      - name: 💾 Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # So sánh nội dung (bỏ qua field "name" để tránh lỗi timestamp nếu có)
          if diff -q <(python -m json.tool monplayer.old.json 2>/dev/null | grep -v '"name"') <(python -m json.tool monplayer.json | grep -v '"name"') > /dev/null 2>&1; then
              echo "✅ No content changes — skipping commit"
              echo "CHANGED=false" >> $GITHUB_ENV
          else
              git add monplayer.json
              git commit -m "🤖 Auto-update: ${{ env.OLD_ITEMS }} → ${{ env.NEW_ITEMS }} movies"
              git push origin HEAD:${{ github.ref_name }} --verbose
              echo "✅ Pushed to ${{ github.ref_name }}"
              echo "CHANGED=true" >> $GITHUB_ENV
          fi

      # Bước 9: Upload artifact
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monplayer-output
          path: |
            monplayer.json
            monplayer.old.json
          retention-days: 7
