name: Scrape YanHH3D

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

env:
  BASE_URL: 'https://yanhh3d.bz'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Cần để git diff hoạt động đúng

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install playwright
          playwright install chromium

      - name: Run scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}

      - name: 📊 Show output preview
        run: |
          echo "=== monplayer.json preview ==="
          head -20 monplayer.json
          echo "=== File size ==="
          ls -lh monplayer.json

      - name: 🔍 Git status debug
        run: |
          echo "=== Git status ==="
          git status
          echo "=== Git diff ==="
          git diff monplayer.json || echo "(no diff or new file)"
          echo "=== Current branch ==="
          git branch -a
          echo "=== Remote URL ==="
          git remote -v

      - name: 💾 Force commit & push
        run: |
          set -e  # Dừng ngay nếu lỗi
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Luôn add file
          git add monplayer.json
          
          # Commit với timestamp để luôn có thay đổi
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          git commit -m "🤖 Auto-update: $TIMESTAMP" || echo "⚠️ Nothing to commit (file unchanged)"
          
          # Push với explicit branch
          echo "📤 Pushing to branch: ${{ github.ref_name }}"
          git push origin HEAD:${{ github.ref_name }} --verbose
          
          echo "✅ Push complete!"

      - name: 📤 Upload artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monplayer-backup
          path: monplayer.json
          retention-days: 3
