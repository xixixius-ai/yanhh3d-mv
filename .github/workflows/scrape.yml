# .github/workflows/debug-scrape.yml
name: Debug Scrape YanHH3D

on:
  workflow_dispatch:

env:
  BASE_URL: 'https://yanhh3d.bz'

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps + Playwright
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium

      - name: Run debug scraper
        run: python scraper.py
        env:
          YANHH_BASE_URL: ${{ env.BASE_URL }}

      - name: Show log summary
        run: |
          echo "=== Candidate slugs found ==="
          grep "✅ Candidate:" log.txt 2>/dev/null || echo "(none in log)"
          echo ""
          echo "=== All hrefs sample ==="
          grep "• /" log.txt 2>/dev/null | head -20 || echo "(none)"

      - name: Upload debug files
        uses: actions/upload-artifact@v4
        with:
          name: debug-files
          path: |
            debug_listing.html
            monplayer.json
          retention-days: 5
